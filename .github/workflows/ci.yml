name: CI

# DevSecOps pipeline. Five concerns in five separate jobs so a flake in one
# doesn't mask issues in another:
#   - backend      → ruff + pytest
#   - frontend     → tsc + (optional) eslint
#   - python-deps  → pip-audit against requirements.txt
#   - npm-deps     → npm audit (high-and-above only, non-blocking initially)
#   - secrets      → gitleaks full-history scan
#
# Anything tagged `continue-on-error: true` is a soft-gate while we burn down
# pre-existing findings. Promote to hard-gate once green.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: python -m ruff check backend tests

      - name: Pytest
        run: python -m pytest

  frontend:
    name: Frontend (tsc + eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

  python-deps:
    name: Python dependency audit (pip-audit)
    runs-on: ubuntu-latest
    # Hard-gated: requirements.txt is on a CVE-clean baseline as of
    # 2026-05-16. New findings should block the PR so Dependabot has a
    # chance to fix them before they reach main.
    steps:
      - uses: actions/checkout@v4
      - uses: pypa/gh-action-pip-audit@v1.0.8
        with:
          inputs: requirements.txt

  npm-deps:
    name: npm dependency audit
    runs-on: ubuntu-latest
    # Hard-gated: as of 2026-05-17, package-lock is on a CVE-clean baseline
    # for high+severity findings. New high-severity vulnerabilities should
    # block the PR so Dependabot has a chance to fix them before main.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Skip postinstall scripts during audit-only setup.
      - run: npm ci --ignore-scripts
      - name: npm audit (high+)
        run: npm audit --audit-level=high

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks needs full history to scan past commits
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  e2e:
    name: E2E (Playwright smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: npm run test:e2e
        env:
          CI: 'true'

      - name: Upload HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
