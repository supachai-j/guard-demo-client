# Builds the runtime image and pushes to GitHub Container Registry (GHCR)
# so the team can `docker pull ghcr.io/supachai-j/guard-demo-client:latest`
# on their VPS without cloning the repo. Repo is public, so the published
# image inherits public read access — no PAT / token required on the puller.
#
# Triggers:
#   - push to main           → tags :main and :<sha>; also retags :latest
#   - push of a vX.Y.Z tag   → tags :vX.Y.Z, :X.Y, and :latest
#   - manual workflow_dispatch
#
# Multi-arch (amd64 + arm64) so deployment to ARM VPS (e.g. Hetzner CAX,
# Oracle Ampere) works from the same image reference.

name: Docker (publish to GHCR)

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # latest = whatever main last built. Semver tags get :vX.Y.Z + :X.Y.
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA cache: cuts subsequent builds from ~5 min to ~1 min by
          # reusing the apt/pip/npm layers.
          cache-from: type=gha
          cache-to: type=gha,mode=max
