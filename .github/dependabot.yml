# Dependabot config — automated dependency updates.
# Free + native to GitHub. Opens PRs grouped by ecosystem.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # Python backend
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Bangkok"
    open-pull-requests-limit: 5
    groups:
      pip-minor-patch:
        update-types:
          - "minor"
          - "patch"
    # Security PRs always open separately (above limit) so they're never delayed.
    labels:
      - "dependencies"
      - "python"

  # Frontend (Vite + React)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Bangkok"
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "javascript"

  # Pin action versions stay fresh too (less frequent — monthly is fine)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
